name: Playwright CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_internal_e2e:
        description: Run internal E2E tests on self-hosted runner
        required: false
        default: false
        type: boolean

jobs:
  quality:
    name: Quality Checks (Public Safe)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate Playwright discovery
        run: npx playwright test --list

  internal-e2e:
    name: Internal E2E (Self-Hosted)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_internal_e2e == true }}
    timeout-minutes: 90
    runs-on: self-hosted
    env:
      PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD: '1'
      LOGIN_URL: ${{ secrets.LOGIN_URL }}
      HOME_URL: ${{ secrets.HOME_URL }}
      E2E_IMPORTATEUR_USERNAME: ${{ secrets.E2E_IMPORTATEUR_USERNAME }}
      E2E_IMPORTATEUR_PASSWORD: ${{ secrets.E2E_IMPORTATEUR_PASSWORD }}
      INTERNAL_HOSTS_ENTRY: ${{ secrets.INTERNAL_HOSTS_ENTRY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: npx playwright install --with-deps

      - name: Install Playwright browsers (Non-Linux)
        if: ${{ runner.os != 'Linux' }}
        run: npx playwright install

      - name: Optional hosts mapping (Linux self-hosted)
        if: ${{ runner.os == 'Linux' && env.INTERNAL_HOSTS_ENTRY != '' }}
        run: |
          echo "$INTERNAL_HOSTS_ENTRY" | sudo tee -a /etc/hosts

      - name: Preflight internal access check
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          if ([string]::IsNullOrWhiteSpace($env:LOGIN_URL) -or [string]::IsNullOrWhiteSpace($env:HOME_URL)) {
            Write-Error 'LOGIN_URL and HOME_URL must be set in repository secrets.'
          }

          Write-Host 'Checking access to LOGIN_URL...'
          $response = Invoke-WebRequest -Uri $env:LOGIN_URL -MaximumRedirection 5 -TimeoutSec 30
          $content = $response.Content

          if ($content -match '(?i)web page blocked|attack id|cannot be displayed') {
            Write-Error 'Access appears blocked by WAF/security gateway from this runner network/IP. Runner outbound IP must be allowlisted for the target environment.'
          }

          Write-Host 'Preflight OK: login page reachable and not blocked.'

      - name: Run importateur E2E tests
        run: npx playwright test tests/importateur --retries=0

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
