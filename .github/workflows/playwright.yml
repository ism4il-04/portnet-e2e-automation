name: Playwright CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      run_internal_e2e:
        description: Run internal E2E tests on self-hosted runner
        required: false
        default: false
        type: boolean

jobs:
  quality:
    name: Quality Checks (Public Safe)
    timeout-minutes: 20
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Validate Playwright discovery
        run: npx playwright test --list

  internal-e2e:
    name: Internal E2E (Self-Hosted)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_internal_e2e == true }}
    timeout-minutes: 90
    runs-on: self-hosted
    env:
      LOGIN_URL: ${{ secrets.LOGIN_URL }}
      HOME_URL: ${{ secrets.HOME_URL }}
      E2E_IMPORTATEUR_USERNAME: ${{ secrets.E2E_IMPORTATEUR_USERNAME }}
      E2E_IMPORTATEUR_PASSWORD: ${{ secrets.E2E_IMPORTATEUR_PASSWORD }}
      INTERNAL_HOSTS_ENTRY: ${{ secrets.INTERNAL_HOSTS_ENTRY }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: lts/*

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Optional hosts mapping (Linux self-hosted)
        if: ${{ runner.os == 'Linux' && env.INTERNAL_HOSTS_ENTRY != '' }}
        run: |
          echo "$INTERNAL_HOSTS_ENTRY" | sudo tee -a /etc/hosts

      - name: Preflight internal access check
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${LOGIN_URL:-}" ] || [ -z "${HOME_URL:-}" ]; then
            echo "LOGIN_URL and HOME_URL must be set in repository secrets."
            exit 1
          fi

          echo "Checking access to LOGIN_URL..."
          curl -sS -L --max-time 30 "$LOGIN_URL" -o preflight_login.html

          if grep -Eiq "web page blocked|attack id|cannot be displayed" preflight_login.html; then
            echo "Access appears blocked by WAF/security gateway from this runner network/IP."
            echo "Runner outbound IP must be allowlisted for the target environment."
            exit 1
          fi

          echo "Preflight OK: login page reachable and not blocked."

      - name: Run importateur E2E tests
        run: npx playwright test tests/importateur --retries=0

      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
